services:
  postgres:
    image: postgres:16-alpine
    container_name: dugout-postgres
    environment:
      POSTGRES_DB: dugout
      POSTGRES_USER: dugout
      POSTGRES_PASSWORD: dugout
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dugout-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
