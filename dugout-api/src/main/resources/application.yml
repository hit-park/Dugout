spring:
  application:
    name: dugout-api
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

server:
  port: 8080
  shutdown: graceful

jwt:
  secret: ${JWT_SECRET:dugout-dev-secret-key-must-be-at-least-256-bits-long-for-hs256}
  access-token-expiry: 900000
  refresh-token-expiry: 2592000000

dugout:
  ai:
    base-url: ${DUGOUT_AI_BASE_URL:http://localhost:8001}
    timeout-ms: 5000

oauth:
  kakao:
    user-info-url: https://kapi.kakao.com/v2/user/me
  naver:
    user-info-url: https://openapi.naver.com/v1/nid/me
  google:
    user-info-url: https://openidconnect.googleapis.com/v1/userinfo
  apple:
    jwks-url: https://appleid.apple.com/auth/keys
    issuer: https://appleid.apple.com
    client-id: ${APPLE_CLIENT_ID:com.dugout.ios}

logging:
  level:
    com.dugout.api: DEBUG
    org.hibernate.SQL: DEBUG
