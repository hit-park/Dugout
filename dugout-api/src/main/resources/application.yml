spring:
  application:
    name: dugout-api
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

server:
  port: 8080
  shutdown: graceful

jwt:
  secret: ${JWT_SECRET:dugout-dev-secret-key-must-be-at-least-256-bits-long-for-hs256}
  access-token-expiry: 900000
  refresh-token-expiry: 2592000000

oauth:
  kakao:
    user-info-url: https://kapi.kakao.com/v2/user/me

logging:
  level:
    com.dugout.api: DEBUG
    org.hibernate.SQL: DEBUG
