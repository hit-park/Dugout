spring:
  datasource:
    url: jdbc:h2:mem:dugout-test
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: test-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  access-token-expiry: 900000
  refresh-token-expiry: 2592000000

oauth:
  kakao:
    user-info-url: https://kapi.kakao.com/v2/user/me
  naver:
    user-info-url: https://openapi.naver.com/v1/nid/me
  google:
    user-info-url: https://openidconnect.googleapis.com/v1/userinfo
  apple:
    jwks-url: https://appleid.apple.com/auth/keys
    issuer: https://appleid.apple.com
    client-id: com.dugout.ios.test
